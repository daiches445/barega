name: Deploy to GitHub Pages

on:
  push:
    branches: 'main'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ vars.PUBLIC_CLOUDINARY_CLOUD_NAME }}
          PUBLIC_CLOUDINARY_GALLERY_TAG: ${{ vars.PUBLIC_CLOUDINARY_GALLERY_TAG }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          # User/org Pages (username.github.io repo) is served at site root, not /repo/.
          if echo "$REPO_NAME" | grep -qiE '\.github\.io$'; then
            export PUBLIC_BASE_PATH=""
          else
            export PUBLIC_BASE_PATH="/$REPO_NAME"
          fi
          echo "PUBLIC_BASE_PATH=$PUBLIC_BASE_PATH"
          npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4